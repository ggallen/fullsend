version: 1

# Sandbox policy for the review agent.
#
# Read-only agent: needs GitHub API (gh pr view, gh pr diff, gh issue view)
# and Vertex AI for inference. No write access to GitHub — the post-script
# handles mutations on the runner with a separate write-scoped token.

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  vertex_ai:
    name: vertex-ai
    endpoints:
      - host: "us-east5-aiplatform.googleapis.com"
        port: 443
        protocol: tcp
        enforcement: enforce
        access: allow
      - host: "oauth2.googleapis.com"
        port: 443
        protocol: tcp
        enforcement: enforce
        access: allow
      - host: "www.googleapis.com"
        port: 443
        protocol: tcp
        enforcement: enforce
        access: allow
      - host: "iamcredentials.googleapis.com"
        port: 443
        protocol: tcp
        enforcement: enforce
        access: allow
    binaries:
      - path: "**/claude"
      - path: "**/node"

  github_api:
    name: github-api
    endpoints:
      - host: "api.github.com"
        port: 443
        protocol: tcp
        enforcement: enforce
        access: allow
      - host: "github.com"
        port: 443
        protocol: tcp
        enforcement: enforce
        access: allow
    binaries:
      - path: "**/gh"
      - path: "**/node"
